# https://splitbrain.github.io/pinoutleaf/
# https://amamamaou.github.io/svg2png/
title: "Shrike Lite (V1.0 R0.4)"

# dimensions counted in pins
width: 10
height: 19

# special pins
types:
  fpga:
    label: "FPGA GPIO"
    bgcolor: "#E38022"
    fgcolor: "#FFFFFF"
  spi_master:
    label: "FPGA load from flash"
    bgcolor: "#cccccc"
    fgcolor: "#333333"
  spi_slave:
    label: "FPGA load from MCU"
    bgcolor: "#FCFBFE"
    fgcolor: "#775EE8"
offsets:
  left: 0
  top: 0
  right: 0
  bottom: 7
# Define the pins (label:type), use empty entries when offsets are needed
pins:
  left:
    - [ "1", "5V:power" ]
    - [ "2", "3.3V:power" ]
    - [ "3", "RP_IO5:gpio" ]
    - [ "4", "RP_IO6:gpio" ]
    - [ "5", "RP_IO7:gpio" ]
    - [ "6", "RP_IO8:gpio", "SPI1 MISO:spi" ]
    - [ "7", "RP_IO9:gpio", "SPI1 CS:spi" ]
    - [ "8", "GND:gnd" ]
    - [ "9", "RP_IO10:gpio", "SPI1 SCK:spi" ]
    - [ "10", "RP_IO11:gpio", "SPI1 MOSI:spi" ]
    - [ "11", "RP_IO14:gpio" ]
    - [ "12", "RP_IO15:gpio" ]
    - [ "13", "GND:gnd" ]
    - [ "14", "FPGA_IO17:fpga" ]
